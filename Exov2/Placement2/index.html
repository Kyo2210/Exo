<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <form method="post">
        <h1>Connexion</h1>
        <div>
            <label for="pseudo" id="label_pseudo">Pseudo :</label>
            <input type="text" name="pseudo" id="pseudo" placeholder="Mon pseudo">
        </div>
        <div id="div_mdp">
            <label for="password" id="label_mdp">Mot de passe :</label>
            <input type="password" name="password" id="password" placeholder="Mon mot de passe">
        </div>
        <div id="div_checkbox">
            <input type="checkbox" name="remember_me" id="remember_me">
            <label for="remember_me"> Se souvenir de moi</label>
        </div>
        <div id="boutons">
            <input type="submit" id="bouton" value="Connexion">
            <input type="reset" id="bouton" value="Retour">
        </div>
    </form>
</body>

</html>
